<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="color-scheme" content="only light" />
<title>AIF-C01 Flash Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { margin: 0; height: 100%; }
  body {
    background:
      radial-gradient(120% 90% at 50% -10%, oklch(0.95 0.008 90), oklch(0.91 0.006 85) 70%);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    font-family: "Hanken Grotesk", system-ui, sans-serif;
  }
  #stage { display: flex; align-items: center; justify-content: center; width: 100vw; height: 100vh; }
  #scaler { transform-origin: center center; }
  #root { width: 402px; height: 874px; }
</style>
</head>
<body>
  <div id="stage">
    <div id="scaler">
      <div id="root"></div>
    </div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script src="quiz-data.js"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="flashcard.jsx"></script>
  <script type="text/babel" src="study.jsx"></script>
  <script type="text/babel" src="home.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script>
    function fitFrame() {
      var s = Math.min((window.innerHeight - 28) / 874, (window.innerWidth - 20) / 402, 1);
      document.getElementById("scaler").style.transform = "scale(" + s + ")";
    }
    window.addEventListener("resize", fitFrame);
    fitFrame();
  </script>
</body>
</html>
